<ion-header>
  <ion-toolbar>
    <ion-title>
      Camera
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="empty" *ngIf="photos.length === 0">
    <ion-icon name="camera-outline"></ion-icon>
    <p>No hay fotos aún</p>
    <p>Presiona + para tomar una</p>
  </div>

  <ion-card *ngFor="let photo of photos">
    <img [src]="photo.imagePath" alt="img">

    <ion-card-header>
      <ion-card-subtitle>{{ photo.photoDate }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      {{ photo.caption }}
    </ion-card-content>


    <ion-item lines="none">

      <ion-button fill="clear" (click)="toggleFavorite(photo)">
        <ion-icon
          [name]="photo.isFavorite ? 'heart' : 'heart-outline'"
          [color]="photo.isFavorite ? 'danger' : 'medium'"
          slot="icon-only">
        </ion-icon>
      </ion-button>

      <ion-button fill="clear" (click)="editCaption(photo)">
        <ion-icon name="create-outline" color="warning" slot="icon-only"></ion-icon>
      </ion-button>

      <ion-button fill="clear" (click)="deletePhoto(photo)" slot="end">
        <ion-icon name="trash-outline" color="danger" slot="icon-only"></ion-icon>
      </ion-button>

    </ion-item>

  </ion-card>

  <ion-fab slot="fixed" vertical="bottom" horizontal="center">
    <ion-fab-button (click)="takePicture()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
